name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (without v prefix, e.g. 0.1.0)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Resolve version
        id: v
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify version matches gradle.properties
        run: |
          expected="${{ steps.v.outputs.version }}"
          actual=$(grep '^pluginVersion[[:space:]]*=' gradle.properties | head -n1 | cut -d= -f2- | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')
          if [ "$expected" != "$actual" ]; then
            echo "Tag/input version ($expected) does not match gradle.properties ($actual)" >&2
            exit 1
          fi

      - name: Build & verify plugin
        run: ./gradlew --no-daemon buildPlugin verifyPlugin

      - name: Locate artifact
        id: artifact
        run: |
          path=$(ls build/distributions/*-${{ steps.v.outputs.version }}.zip)
          echo "path=$path" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$path")" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.v.outputs.version }}
          files: ${{ steps.artifact.outputs.path }}
          generate_release_notes: true

      - name: Generate updatePlugins.xml
        run: ./scripts/gen-update-xml.sh "${{ steps.v.outputs.version }}" "${{ steps.artifact.outputs.name }}"

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./public
          keep_files: true
